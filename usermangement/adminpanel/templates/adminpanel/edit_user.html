<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .edit-container {
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .edit-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .edit-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 15px 50px rgba(59, 130, 246, 0.2);
        }

        .edit-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 14px;
            margin-top: 8px;
        }

        .user-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #60a5fa;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #f1f5f9;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder {
            color: rgba(203, 213, 225, 0.5);
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[type="text"]:valid,
        input[type="email"]:valid {
            border-color: #10b981;
        }

        /* Messages */
        .messages {
            margin-bottom: 20px;
        }

        .message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 14px;
            animation: slideUp 0.4s ease-out;
            margin-bottom: 10px;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #86efac;
        }

        .message.info {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px 16px;
            margin-top: 10px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 20px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: 1.5px solid #334155;
            color: #f1f5f9;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-cancel:hover {
            border-color: #ef4444;
            color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
        }

        .divider {
            height: 1px;
            background: #334155;
            margin: 25px 0;
        }

        .footer-section {
            text-align: center;
        }

        .footer-text {
            color: #cbd5e1;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .footer-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            position: relative;
        }

        .footer-link:hover {
            color: #3b82f6;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #3b82f6;
            transition: width 0.3s ease;
        }

        .footer-link:hover::after {
            width: 100%;
        }

        @media (max-width: 480px) {
            .edit-card {
                padding: 30px 20px;
            }

            h2 {
                font-size: 24px;
            }

            input[type="text"],
            input[type="email"],
            button[type="submit"] {
                font-size: 14px;
                padding: 10px 14px;
            }

            .logo-icon {
                width: 52px;
                height: 52px;
                font-size: 26px;
                margin-bottom: 16px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="edit-container">
        <div class="edit-card">
            <!-- Header -->
            <div class="edit-header">
                <div class="logo-icon">✏️</div>
                <h2>Edit User</h2>
                <p class="subtitle">Update your profile information</p>
            </div>

            <!-- Messages -->
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <!-- User Info Badge -->
            <div class="user-info">
                👤 Editing: <strong>{{ user.username }}</strong>
            </div>

            <!-- Form -->
            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username"
                        name="username" 
                        value="{{ user.username }}"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email"
                        name="email" 
                        value="{{ user.email }}"
                        placeholder="Enter email address"
                        required
                    >
                </div>

                <button type="submit">Update User</button>

                <div class="divider"></div>

                <div class="footer-section">
                    <p class="footer-text">Want to go back?</p>
                    <a href="/admin_side/" class="footer-link">Back to Users List</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
